<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Sandoval - Events Calendar</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f5f5;
    }

    /* Header Section */
    .header {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: white;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .manage-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .manage-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    .manage-btn::after {
      content: "→";
      font-size: 16px;
    }

    /* Main Calendar Container */
    .calendar-wrapper {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Calendar Header with Controls */
    .calendar-header {
      background: linear-gradient(to right, #fcd34d 0%, #fbbf24 100%);
      border: 3px solid #333;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      border-bottom: none;
    }

    .month-navigation {
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 900;
      font-size: 20px;
      color: #333;
    }

    .nav-arrow {
      background: #333;
      color: #fbbf24;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .nav-arrow:hover {
      background: #555;
      transform: scale(1.1);
    }

    .current-date-display {
      text-align: center;
      flex: 1;
    }

    .current-day {
      font-size: 24px;
      font-weight: 900;
      color: #333;
    }

    .current-time {
      font-size: 14px;
      font-weight: 700;
      color: #666;
      margin-top: 2px;
    }

    .view-controls {
      display: flex;
      gap: 10px;
    }

    .view-btn {
      background: #333;
      color: #fcd34d;
      border: none;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 4px;
    }

    .view-btn:hover {
      background: #555;
    }

    .view-btn.active {
      background: #1f2937;
    }

    /* Calendar Grid */
    .calendar-grid {
      background: white;
      border: 3px solid #333;
      border-top: none;
    }

    .day-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f3f4f6;
      border-bottom: 2px solid #333;
    }

    .day-header-cell {
      padding: 15px;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
      color: #333;
      border-right: 1px solid #ddd;
    }

    .day-header-cell:last-child {
      border-right: none;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      aspect-ratio: 1;
      border-right: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 10px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calendar-day:hover {
      background: #f9fafb;
    }

    .calendar-day.other-month {
      background: #f9fafb;
      color: #999;
    }

    .calendar-day.today {
      background: #e0f2fe;
    }

    .day-number {
      font-weight: 700;
      font-size: 16px;
      color: #333;
    }

    .calendar-day.other-month .day-number {
      color: #bbb;
    }

    .day-events {
      margin-top: 5px;
      width: 100%;
      font-size: 10px;
      color: #666;
    }

    .event-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #3b82f6;
      border-radius: 50%;
      margin-right: 3px;
    }

    /* Footer */
    .footer {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }

      .calendar-header {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .month-navigation {
        font-size: 16px;
        gap: 10px;
      }

      .calendar-day {
        min-height: 80px;
        font-size: 12px;
      }

      .day-number {
        font-size: 14px;
      }

      .view-controls {
        flex-wrap: wrap;
        justify-content: center;
      }

      .view-btn {
        padding: 8px 15px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <!-- ✅ HEADER SECTION -->
  <div class="header">
    <h1>CCF SANDOVAL EVENTS</h1>
    <button class="manage-btn" onclick="window.location.href='admin/login.html'">MANAGE EVENT</button>
  </div>

  <!-- ✅ MAIN CALENDAR SECTION -->
  <div class="calendar-wrapper">
    <!-- Calendar Header with Controls -->
    <div class="calendar-header">
      <div class="month-navigation">
        <span id="monthYear">JUNE 2026</span>
        <button class="nav-arrow" onclick="previousMonth()">‹</button>
        <button class="nav-arrow" onclick="nextMonth()">›</button>
      </div>

      <div class="current-date-display">
        <div class="current-day" id="currentDay">TUESDAY</div>
        <div class="current-time" id="currentTime">11:30 AM</div>
      </div>

      <div class="view-controls">
        <button class="view-btn active" onclick="setView('month')">MONTH</button>
        <button class="view-btn" onclick="setView('day')">DAY</button>
        <button class="view-btn" onclick="setView('list')">LIST</button>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid">
      <div class="day-header">
        <div class="day-header-cell">SUN</div>
        <div class="day-header-cell">MON</div>
        <div class="day-header-cell">TUE</div>
        <div class="day-header-cell">WED</div>
        <div class="day-header-cell">THU</div>
        <div class="day-header-cell">FRI</div>
        <div class="day-header-cell">SAT</div>
      </div>

      <div class="calendar-days" id="calendarDays">
        <!-- Calendar days will be populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- ✅ FOOTER -->
  <div class="footer">
    ©2026 CCF SANDOVAL EVENTS. ALL RIGHTS RESERVED.
  </div>

  <!-- ✅ Calendar Logic -->
  <script>
    let currentDate = new Date(2026, 5, 23); // June 23, 2026
    let currentView = 'month';

    function generateCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // Update month/year display
      const monthNames = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE',
                         'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
      document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;

      // Update current day and time
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[currentDate.getDay()];

      // Get first day of month and number of days
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendarDaysDiv = document.getElementById('calendarDays');
      calendarDaysDiv.innerHTML = '';

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${daysInPrevMonth - i}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        // Highlight today
        const today = new Date();
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          dayDiv.classList.add('today');
        }

        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        dayDiv.onclick = () => selectDay(year, month, day);
        calendarDaysDiv.appendChild(dayDiv);
      }

      // Next month days
      const totalCells = calendarDaysDiv.children.length;
      const remainingCells = 42 - totalCells; // 6 rows × 7 days
      for (let day = 1; day <= remainingCells; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      generateCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      generateCalendar();
    }

    function selectDay(year, month, day) {
      const selected = new Date(year, month, day);
      currentDate = selected;
      generateCalendar();
      
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[selected.getDay()];
    }

    function setView(view) {
      currentView = view;
      // Update button active states
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (view === 'list') {
        alert('List view coming soon!');
      } else if (view === 'day') {
        alert('Day view coming soon!');
      }
    }

    // Update current time every minute
    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('currentTime').textContent = `${hours}:${minutes}`;
    }

    // Initialize calendar on page load
    window.addEventListener('DOMContentLoaded', () => {
      generateCalendar();
      updateTime();
      setInterval(updateTime, 60000); // Update time every minute
    });
  </script>

</body>
</html>

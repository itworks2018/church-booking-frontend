<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Sandoval - Events Calendar</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header Section */
    .header {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }

    .header h1 {
      color: white;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .manage-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .manage-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    .manage-btn::after {
      content: "→";
      font-size: 16px;
    }

    /* Main Calendar Container */
    .calendar-wrapper {
      width: 100%;
      margin: 0;
      padding: 15px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* Calendar Header with Controls */
    .calendar-header {
      background: linear-gradient(to right, #fcd34d 0%, #fbbf24 100%);
      border: 3px solid #333;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      border-bottom: none;
      flex-shrink: 0;
    }

    .month-navigation {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 16px;
      color: #333;
    }

    .nav-arrow {
      background: #333;
      color: #fbbf24;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .nav-arrow:hover {
      background: #555;
      transform: scale(1.1);
    }

    .current-date-display {
      text-align: center;
      flex: 1;
    }

    .current-day {
      font-size: 18px;
      font-weight: 900;
      color: #333;
    }

    .current-time {
      font-size: 12px;
      font-weight: 700;
      color: #666;
      margin-top: 2px;
    }

    .view-controls {
      display: flex;
      gap: 10px;
    }

    .view-btn {
      background: #333;
      color: #fcd34d;
      border: none;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 4px;
    }

    .view-btn:hover {
      background: #555;
    }

    .view-btn.active {
      background: #1f2937;
    }

    /* Calendar Grid */
    .calendar-grid {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .calendar-grid.hidden {
      display: none;
    }

    /* Day View Styles */
    .day-view {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 15px 20px;
      color: #333;
      overflow: hidden;
      min-height: 0;
    }

    .day-view.hidden {
      display: none;
    }

    .day-view-header {
      margin-bottom: 15px;
      flex-shrink: 0;
    }

    .day-view-date {
      font-size: 18px;
      font-weight: 900;
      color: #0891b2;
      margin-bottom: 10px;
    }

    .day-view-timeline {
      display: flex;
      gap: 20px;
      flex: 1;
      overflow: hidden;
    }

    .timeline-hours {
      display: flex;
      flex-direction: column;
      gap: 40px;
      min-width: 65px;
      padding-right: 12px;
      border-right: 2px solid #ddd;
    }

    .timeline-hour {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      height: 40px;
      display: flex;
      align-items: flex-start;
    }

    .timeline-events {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 40px;
      overflow: hidden;
      min-height: 0;
    }

    .timeline-slot {
      height: 40px;
      position: relative;
      border-bottom: 1px solid #e0e0e0;
    }

    .timeline-slot:last-child {
      border-bottom: none;
    }

    .timeline-event {
      position: absolute;
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: white;
      padding: 6px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      min-width: 160px;
      border-left: 3px solid #0e7490;
    }

    .timeline-event-time {
      font-size: 12px;
      opacity: 0.9;
    }

    .timeline-event-title {
      font-weight: 700;
      margin-top: 3px;
    }

    .day-view-no-events {
      text-align: center;
      color: #999;
      font-style: italic;
      padding: 40px;
      font-size: 16px;
    }

    /* List View Styles */
    .list-view {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 15px 20px;
      overflow: auto;
      min-height: 0;
    }

    .list-view.hidden {
      display: none;
    }

    .list-view-title {
      font-size: 18px;
      font-weight: 900;
      color: #0891b2;
      margin-bottom: 15px;
      flex-shrink: 0;
    }

    .event-item {
      background: #f3f4f6;
      padding: 10px;
      margin-bottom: 10px;
      border-left: 4px solid #0891b2;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .event-item-date {
      font-weight: 700;
      color: #0891b2;
      font-size: 12px;
    }

    .event-item-title {
      font-size: 13px;
      font-weight: 700;
      margin-top: 3px;
    }

    .event-item-time {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }

    .list-view-no-events {
      text-align: center;
      color: #999;
      font-style: italic;
      margin-top: 40px;
    }

    .day-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f3f4f6;
      border-bottom: 2px solid #333;
      flex-shrink: 0;
      gap: 0;
    }

    .day-header-cell {
      padding: 10px;
      text-align: center;
      font-weight: 900;
      font-size: 12px;
      color: #333;
      border-right: 1px solid #ddd;
    }

    .day-header-cell:last-child {
      border-right: none;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .calendar-day {
      border-right: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .calendar-day:hover {
      background: #f9fafb;
    }

    .calendar-day.other-month {
      background: #f9fafb;
      color: #999;
    }

    .calendar-day.today {
      background: #e0f2fe;
    }

    .day-number {
      font-weight: 700;
      font-size: 12px;
      color: #333;
      flex-shrink: 0;
    }

    .calendar-day.other-month .day-number {
      color: #bbb;
    }

    .day-events {
      margin-top: 5px;
      width: 100%;
      font-size: 10px;
      color: #666;
    }

    .event-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #3b82f6;
      border-radius: 50%;
      margin-right: 3px;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.3s ease;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #0891b2;
      padding-bottom: 15px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 900;
      color: #0891b2;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #666;
      transition: all 0.2s ease;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: #0891b2;
      transform: scale(1.2);
    }

    .modal-events {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-event {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
      color: white;
      padding: 15px;
      border-radius: 6px;
      border-left: 4px solid #0e7490;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .modal-event-time {
      font-size: 12px;
      opacity: 0.9;
      font-weight: 600;
    }

    .modal-event-title {
      font-size: 16px;
      font-weight: 700;
      margin-top: 8px;
    }

    .modal-event-meta {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.9;
    }

    .modal-no-events {
      text-align: center;
      color: #999;
      font-style: italic;
      padding: 40px 20px;
      font-size: 16px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Footer */
    .footer {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: auto;
      flex-shrink: 0;
    }

    /* Responsive Design */
    @media (max-width: 1024px) {
      .calendar-wrapper {
        padding: 12px 15px;
        overflow: hidden;
      }

      .calendar-header {
        padding: 10px 15px;
      }

      .calendar-day {
        padding: 5px;
      }

      .day-number {
        font-size: 10px;
      }

      .day-header-cell {
        padding: 8px;
        font-size: 11px;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 10px;
        padding: 10px 15px;
      }

      .header h1 {
        font-size: 18px;
      }

      .calendar-wrapper {
        padding: 10px 12px;
        overflow: hidden;
      }

      .calendar-header {
        flex-direction: column;
        gap: 8px;
        padding: 10px 12px;
        flex-shrink: 0;
      }

      .month-navigation {
        font-size: 13px;
        gap: 8px;
      }

      .current-day {
        font-size: 14px;
      }

      .current-time {
        font-size: 10px;
      }

      .calendar-day {
        padding: 4px;
      }

      .day-number {
        font-size: 8px;
      }

      .view-controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
      }

      .view-btn {
        padding: 6px 12px;
        font-size: 10px;
      }

      .day-view {
        padding: 10px 12px;
      }

      .list-view {
        padding: 10px 12px;
      }

      .day-view-header {
        margin-bottom: 10px;
      }

      .day-view-date {
        font-size: 14px;
      }

      .timeline-hours {
        min-width: 55px;
        padding-right: 8px;
        gap: 30px;
      }

      .timeline-hour {
        font-size: 9px;
        height: 30px;
      }

      .timeline-events {
        gap: 30px;
      }

      .timeline-slot {
        height: 30px;
      }

      .timeline-event {
        font-size: 9px;
        padding: 4px 6px;
        min-width: 140px;
      }

      .timeline-event-time {
        font-size: 8px;
      }

      .timeline-event-title {
        margin-top: 2px;
      }

      .list-view-title {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .event-item {
        padding: 8px;
        margin-bottom: 8px;
      }

      .event-item-date {
        font-size: 10px;
      }

      .event-item-title {
        font-size: 11px;
        margin-top: 2px;
      }

      .event-item-time {
        font-size: 9px;
        margin-top: 2px;
      }

      .day-header-cell {
        padding: 6px;
        font-size: 9px;
      }

        border-top: 3px solid #333;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 8px 10px;
      }

      .header h1 {
        font-size: 14px;
        letter-spacing: 0px;
      }

      .manage-btn {
        padding: 6px 12px;
        font-size: 10px;
      }

      .calendar-wrapper {
        padding: 8px 10px;
      }

      .calendar-header {
        padding: 8px 10px;
        gap: 6px;
      }

      .month-navigation {
        font-size: 11px;
        gap: 6px;
      }

      .nav-arrow {
        width: 28px;
        height: 28px;
        font-size: 14px;
      }

      .current-day {
        font-size: 12px;
      }

      .current-time {
        font-size: 9px;
      }

      .view-btn {
        padding: 5px 10px;
        font-size: 9px;
      }

      .calendar-day {
        min-height: 45px;

      }

      }

        height: 25px;
      }

        padding: 8px 10px;
      }

        font-size: 12px;
        margin-bottom: 8px;

      }

      .modal-content {
        width: 95%;\n      }\n\n      .modal-title {\n        font-size: 16px;\n      }\n\n      .modal-event {\n        padding: 12px;\n      }\n\n      .modal-event-title {\n        font-size: 14px;\n      }\n    }
  </style>
</head>
<body>

  <!-- ✅ HEADER SECTION -->
  <div class="header">
    <h1>CCF SANDOVAL EVENTS</h1>
    <button class="manage-btn" onclick="window.location.href='admin/login.html'">MANAGE EVENT</button>
  </div>

  <!-- ✅ MAIN CALENDAR SECTION -->
  <div class="calendar-wrapper">
    <!-- Calendar Header with Controls -->
    <div class="calendar-header">
      <div class="month-navigation">
        <span id="monthYear">JUNE 2026</span>
        <button class="nav-arrow" onclick="previousMonth()">‹</button>
        <button class="nav-arrow" onclick="nextMonth()">›</button>
      </div>

      <div class="current-date-display">
        <div class="current-day" id="currentDay">TUESDAY</div>
        <div class="current-time" id="currentTime">11:30 AM</div>
      </div>

      <div class="view-controls">
        <button class="view-btn active" onclick="setView('month', this)">MONTH</button>
        <button class="view-btn" onclick="setView('day', this)">DAY</button>
        <button class="view-btn" onclick="setView('list', this)">LIST</button>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid" id="calendarGrid">
      <div class="day-header">
        <div class="day-header-cell">SUN</div>
        <div class="day-header-cell">MON</div>
        <div class="day-header-cell">TUE</div>
        <div class="day-header-cell">WED</div>
        <div class="day-header-cell">THU</div>
        <div class="day-header-cell">FRI</div>
        <div class="day-header-cell">SAT</div>
      </div>

      <div class="calendar-days" id="calendarDays">
        <!-- Calendar days will be populated by JavaScript -->
      </div>
    </div>

    <!-- Day Events Modal -->
    <div class="modal" id="dayEventsModal">
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-title" id="modalDate"></div>
          <button class="modal-close" onclick="closeDayEventsModal()">&times;</button>
        </div>
        <div class="modal-events" id="modalEvents"></div>
      </div>
    </div>

    <!-- Day View -->
    <div class="day-view hidden" id="dayView">
      <div class="day-view-header">
        <div class="day-view-date" id="dayViewDate"></div>
      </div>
      <div class="day-view-timeline" id="dayViewTimeline">
        <div class="timeline-hours" id="timelineHours"></div>
        <div class="timeline-events" id="timelineEvents"></div>
      </div>
    </div>

    <!-- List View -->
    <div class="list-view hidden" id="listView">
      <div class="list-view-title">All Upcoming Events</div>
      <div id="listViewEvents">
        <div class="list-view-no-events">No events scheduled.</div>
      </div>
    </div>
  </div>

  <!-- ✅ FOOTER -->
  <div class="footer">
    ©2026 CCF SANDOVAL EVENTS. ALL RIGHTS RESERVED.
  </div>

  <!-- ✅ Calendar Logic -->
  <script>
    let currentDate = new Date();
    let currentView = 'month';
    let approvedEvents = [];

    const API_BASE_URL = 'https://church-booking-backend.onrender.com';

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatTime(hours, minutes) {
      const period = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      const displayMinutes = String(minutes).padStart(2, '0');
      return `${displayHours}:${displayMinutes} ${period}`;
    }

    function formatEventDateTime(dateValue, options = {}) {
      const date = new Date(dateValue);
      if (Number.isNaN(date.getTime())) {
        return 'TBD';
      }

      return date.toLocaleString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        ...options
      });
    }

    function getDateKey(date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${year}-${month}-${day}`;
    }

    function getEventsForDate(date) {
      const dateKey = getDateKey(date);
      return approvedEvents.filter(event => getDateKey(new Date(event.start)) === dateKey);
    }

    async function loadApprovedSchedule() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/bookings/public/approved`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        approvedEvents = Array.isArray(data.items) ? data.items.map(booking => ({
          id: booking.id,
          title: booking.event_name || 'Approved Event',
          start: booking.start_datetime,
          end: booking.end_datetime,
          venue: booking.venue || 'Not specified',
          purpose: booking.purpose || 'Not specified',
          attendees: booking.attendees || 'Not specified',
          additionalNeeds: booking.additional_needs || 'None noted'
        })) : [];
      } catch (error) {
        console.error('Unable to load approved schedule:', error);
        approvedEvents = [];
      }
    }

    function generateCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      const monthNames = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE',
                         'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
      document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;

      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[currentDate.getDay()];

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendarDaysDiv = document.getElementById('calendarDays');
      calendarDaysDiv.innerHTML = '';

      for (let i = firstDay - 1; i >= 0; i--) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${daysInPrevMonth - i}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        const today = new Date();
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          dayDiv.classList.add('today');
        }

        const dateForDay = new Date(year, month, day);
        const dayEvents = getEventsForDate(dateForDay);
        const eventsMarkup = dayEvents.length > 0
          ? `<div class="day-events"><span class="event-dot"></span>${dayEvents.length} event${dayEvents.length > 1 ? 's' : ''}</div>`
          : '';

        dayDiv.innerHTML = `<div class="day-number">${day}</div>${eventsMarkup}`;
        dayDiv.onclick = () => showDayEventsModal(year, month, day);
        calendarDaysDiv.appendChild(dayDiv);
      }

      const totalCells = calendarDaysDiv.children.length;
      const remainingCells = 42 - totalCells;
      for (let day = 1; day <= remainingCells; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      generateCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      generateCalendar();
    }

    function selectDay(year, month, day) {
      const selected = new Date(year, month, day);
      currentDate = selected;
      generateCalendar();

      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[selected.getDay()];

      if (currentView === 'day') {
        updateDayView();
      }
    }

    function showDayEventsModal(year, month, day) {
      const selectedDate = new Date(year, month, day);
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];

      const dateDisplay = `${dayNames[selectedDate.getDay()]}, ${monthNames[month]} ${day}, ${year}`;
      document.getElementById('modalDate').textContent = dateDisplay;

      const events = getEventsForDate(selectedDate);
      const modalEvents = document.getElementById('modalEvents');

      if (events.length === 0) {
        modalEvents.innerHTML = '<div class="modal-no-events">No approved events scheduled for this day.</div>';
      } else {
        modalEvents.innerHTML = events.map(event => {
          const startTime = formatEventDateTime(event.start, { hour: 'numeric', minute: '2-digit' });
          const endTime = formatEventDateTime(event.end, { hour: 'numeric', minute: '2-digit' });

          return `
            <div class="modal-event">
              <div class="modal-event-time">${escapeHtml(startTime)} - ${escapeHtml(endTime)}</div>
              <div class="modal-event-title">${escapeHtml(event.title)}</div>
              <div class="modal-event-meta">Venue: ${escapeHtml(event.venue)}</div>
              <div class="modal-event-meta">Purpose: ${escapeHtml(event.purpose)}</div>
              <div class="modal-event-meta">Attendees: ${escapeHtml(event.attendees)}</div>
            </div>
          `;
        }).join('');
      }

      document.getElementById('dayEventsModal').classList.add('show');
    }

    function closeDayEventsModal() {
      document.getElementById('dayEventsModal').classList.remove('show');
    }

    window.addEventListener('click', (event) => {
      const modal = document.getElementById('dayEventsModal');
      if (event.target === modal) {
        closeDayEventsModal();
      }
    });

    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      document.getElementById('currentTime').textContent = formatTime(hours, minutes);
    }

    function updateDayView() {
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];

      const dateDisplay = `${dayNames[currentDate.getDay()]}, ${monthNames[currentDate.getMonth()]} ${currentDate.getDate()}, ${currentDate.getFullYear()}`;
      document.getElementById('dayViewDate').textContent = dateDisplay;

      const timelineHours = document.getElementById('timelineHours');
      const timelineEvents = document.getElementById('timelineEvents');
      timelineHours.innerHTML = '';
      timelineEvents.innerHTML = '';

      const events = getEventsForDate(currentDate);
      if (events.length === 0) {
        timelineEvents.innerHTML = '<div class="day-view-no-events">No approved events scheduled for this day.</div>';
        return;
      }

      timelineEvents.innerHTML = events.map(event => `
        <div class="event-item">
          <div class="event-item-date">${escapeHtml(formatEventDateTime(event.start, { hour: 'numeric', minute: '2-digit' }))} - ${escapeHtml(formatEventDateTime(event.end, { hour: 'numeric', minute: '2-digit' }))}</div>
          <div class="event-item-title">${escapeHtml(event.title)}</div>
          <div class="event-item-time">${escapeHtml(event.venue)} • ${escapeHtml(event.purpose)}</div>
        </div>
      `).join('');
    }

    function updateListView() {
      const allEvents = approvedEvents.slice().sort((a, b) => new Date(a.start) - new Date(b.start));
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];

      const listDiv = document.getElementById('listViewEvents');
      if (allEvents.length === 0) {
        listDiv.innerHTML = '<div class="list-view-no-events">No approved events scheduled.</div>';
      } else {
        listDiv.innerHTML = allEvents.map(item => {
          const date = new Date(item.start);
          const dateStr = `${monthNames[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
          return `
            <div class="event-item">
              <div class="event-item-date">${dateStr}</div>
              <div class="event-item-title">${escapeHtml(item.title)}</div>
              <div class="event-item-time">${escapeHtml(formatEventDateTime(item.start, { hour: 'numeric', minute: '2-digit' }))} - ${escapeHtml(formatEventDateTime(item.end, { hour: 'numeric', minute: '2-digit' }))}</div>
            </div>
          `;
        }).join('');
      }
    }

    function setView(view, button) {
      currentView = view;

      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      if (button) {
        button.classList.add('active');
      }

      document.getElementById('calendarGrid').classList.add('hidden');
      document.getElementById('dayView').classList.add('hidden');
      document.getElementById('listView').classList.add('hidden');

      if (view === 'month') {
        document.getElementById('calendarGrid').classList.remove('hidden');
      } else if (view === 'day') {
        document.getElementById('dayView').classList.remove('hidden');
        updateDayView();
      } else if (view === 'list') {
        document.getElementById('listView').classList.remove('hidden');
        updateListView();
      }
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await loadApprovedSchedule();
      generateCalendar();
      updateTime();
      setInterval(updateTime, 60000);
    });
  </script>

</body>
</html>

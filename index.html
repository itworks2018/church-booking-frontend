<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Sandoval - Events Calendar</title>
  <!-- Tailwind + Flowbite -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .fc { font-family: 'Poppins', sans-serif; }
    .fc .fc-button-primary { background-color: #2563eb; border-color: #2563eb; }
    .fc .fc-button-primary:hover { background-color: #1d4ed8; }
    .fc .fc-button-primary.fc-button-active { background-color: #1e40af; }
    .fc .fc-event { background-color: #3b82f6; border-color: #2563eb; }
    .fc .fc-event:hover { background-color: #2563eb; }
    .fc .fc-daygrid-day.fc-day-today { background-color: #f0f9ff; }
    .fc-h-event { background-color: #3b82f6 !important; }
    .approved-badge { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .calendar-container { height: 100%; width: 100%; }
    .fc { height: 100%; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 flex flex-col min-h-screen">

  <!-- ✅ NAVIGATION BAR -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <!-- Logo & Title -->
        <div class="flex items-center gap-3">
          <img src="assets/carouselSlides/ccfsandoval.jpg" alt="CCF Sandoval" class="h-12 w-12 rounded-full object-cover shadow-md" />
          <div>
            <h1 class="text-2xl font-bold text-gray-900">CCF Sandoval</h1>
            <p class="text-xs text-gray-500">Events & Calendar</p>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center gap-3">
          <a href="login.html" class="px-4 py-2 text-gray-700 hover:text-gray-900 font-semibold transition">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ✅ HEADER SECTION -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6">
        <div>
          <h2 class="text-4xl font-bold text-gray-900 mb-2">Event Calendar</h2>
          <p class="text-gray-600 text-lg">View all approved church events and activities</p>
        </div>
        <div class="text-right">
          <p class="text-3xl font-bold text-blue-600" id="currentDate"></p>
          <p class="text-gray-600 mt-1" id="currentDay"></p>
          <p class="text-sm text-gray-500 mt-1" id="currentTime"></p>
        </div>
      </div>
    </div>
  </header>

  <!-- ✅ MAIN CALENDAR SECTION -->
  <main class="w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col flex-1">
    <div class="max-w-7xl mx-auto w-full">
      <!-- Calendar Controls -->
      <div class="mb-6">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
          <div>
            <h3 class="text-xl font-semibold text-gray-900">Select View</h3>
            <p class="text-gray-600 text-sm">Choose how you want to view the calendar</p>
          </div>
          <div class="flex gap-2 flex-wrap">
            <button id="monthViewBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition shadow-md">Month</button>
            <button id="weekViewBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition">Week</button>
            <button id="dayViewBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition">Day</button>
            <button id="listViewBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition">List</button>
          </div>
        </div>
      </div>
    </div>

    <!-- FullCalendar Container - Full Width -->
    <div class="bg-white shadow-lg border-t border-b border-gray-200 w-full flex-1 flex flex-col">
      <div class="w-full h-full p-6">
        <div id="calendar" class="calendar-container w-full h-full"></div>
      </div>
    </div>
  </main>

  <!-- ✅ EVENT DETAILS MODAL -->
  <div id="eventModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-screen overflow-y-auto">
      <div class="p-8">
        <!-- Header -->
        <div class="flex justify-between items-start mb-6">
          <div>
            <span class="approved-badge text-white text-xs px-3 py-1 rounded-full font-semibold inline-block mb-2">✓ APPROVED</span>
            <h2 id="modalTitle" class="text-3xl font-bold text-gray-900 mt-2"></h2>
          </div>
          <button id="closeModal" class="text-gray-400 hover:text-gray-700 text-3xl w-10 h-10 flex items-center justify-center">&times;</button>
        </div>

        <!-- Content -->
        <div id="modalContent" class="space-y-6">
          <!-- Dynamically populated -->
        </div>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row gap-3">
          <a href="login.html" class="flex-1 bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition text-center">Login to Book</a>
          <button id="closeModalBtn" class="flex-1 bg-gray-200 text-gray-800 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ FOOTER -->
  <footer class="bg-white shadow-md py-6 mt-16 border-t border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center">
        <!-- Left: Facebook Icon -->
        <a href="https://www.facebook.com/ccfsandoval" target="_blank" class="text-gray-400 hover:text-blue-600 transition" aria-label="Visit CCF Sandoval Facebook">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>

        <!-- Right: Copyright Text -->
        <p class="text-sm text-gray-600">© 2025 CCF Sandoval. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- ✅ Calendar Logic -->
  <script src="js/public-calendar.js" defer></script>

</body>
</html>

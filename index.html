<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCF Sandoval - Events Calendar</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header Section */
    .header {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      color: white;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .manage-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .manage-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    .manage-btn::after {
      content: "→";
      font-size: 16px;
    }

    /* Main Calendar Container */
    .calendar-wrapper {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Calendar Header with Controls */
    .calendar-header {
      background: linear-gradient(to right, #fcd34d 0%, #fbbf24 100%);
      border: 3px solid #333;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
      border-bottom: none;
    }

    .month-navigation {
      display: flex;
      align-items: center;
      gap: 20px;
      font-weight: 900;
      font-size: 20px;
      color: #333;
    }

    .nav-arrow {
      background: #333;
      color: #fbbf24;
      border: none;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .nav-arrow:hover {
      background: #555;
      transform: scale(1.1);
    }

    .current-date-display {
      text-align: center;
      flex: 1;
    }

    .current-day {
      font-size: 24px;
      font-weight: 900;
      color: #333;
    }

    .current-time {
      font-size: 14px;
      font-weight: 700;
      color: #666;
      margin-top: 2px;
    }

    .view-controls {
      display: flex;
      gap: 10px;
    }

    .view-btn {
      background: #333;
      color: #fcd34d;
      border: none;
      padding: 10px 20px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 4px;
    }

    .view-btn:hover {
      background: #555;
    }

    .view-btn.active {
      background: #1f2937;
    }

    /* Calendar Grid */
    .calendar-grid {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .calendar-grid.hidden {
      display: none;
    }

    /* Day View Styles */
    .day-view {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px;
      font-size: 18px;
      color: #333;
      line-height: 1.8;
    }

    .day-view.hidden {
      display: none;
    }

    .day-view-content {
      flex: 1;
    }

    .day-view-date {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 20px;
      color: #0891b2;
    }

    .day-view-events {
      margin-top: 20px;
    }

    .day-view-event {
      background: #f3f4f6;
      padding: 15px;
      margin-bottom: 10px;
      border-left: 4px solid #0891b2;
      border-radius: 4px;
    }

    .day-view-no-events {
      color: #999;
      font-style: italic;
    }

    /* List View Styles */
    .list-view {
      background: white;
      border: 3px solid #333;
      border-top: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px;
      overflow-y: auto;
    }

    .list-view.hidden {
      display: none;
    }

    .list-view-title {
      font-size: 24px;
      font-weight: 900;
      color: #0891b2;
      margin-bottom: 20px;
    }

    .event-item {
      background: #f3f4f6;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #0891b2;
      border-radius: 4px;
    }

    .event-item-date {
      font-weight: 700;
      color: #0891b2;
    }

    .event-item-title {
      font-size: 16px;
      font-weight: 700;
      margin-top: 5px;
    }

    .event-item-time {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    .list-view-no-events {
      text-align: center;
      color: #999;
      font-style: italic;
      margin-top: 40px;
    }

    .day-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f3f4f6;
      border-bottom: 2px solid #333;
      flex-shrink: 0;
    }

    .day-header-cell {
      padding: 15px;
      text-align: center;
      font-weight: 900;
      font-size: 14px;
      color: #333;
      border-right: 1px solid #ddd;
    }

    .day-header-cell:last-child {
      border-right: none;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      flex: 1;
    }

    .calendar-day {
      aspect-ratio: 1;
      border-right: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 10px;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      background: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calendar-day:hover {
      background: #f9fafb;
    }

    .calendar-day.other-month {
      background: #f9fafb;
      color: #999;
    }

    .calendar-day.today {
      background: #e0f2fe;
    }

    .day-number {
      font-weight: 700;
      font-size: 16px;
      color: #333;
    }

    .calendar-day.other-month .day-number {
      color: #bbb;
    }

    .day-events {
      margin-top: 5px;
      width: 100%;
      font-size: 10px;
      color: #666;
    }

    .event-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: #3b82f6;
      border-radius: 50%;
      margin-right: 3px;
    }

    /* Footer */
    .footer {
      background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-top: auto;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }

      .calendar-header {
        flex-direction: column;
        gap: 15px;
        padding: 15px;
      }

      .month-navigation {
        font-size: 16px;
        gap: 10px;
      }

      .calendar-day {
        min-height: 80px;
        font-size: 12px;
      }

      .day-number {
        font-size: 14px;
      }

      .view-controls {
        flex-wrap: wrap;
        justify-content: center;
      }

      .view-btn {
        padding: 8px 15px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <!-- ✅ HEADER SECTION -->
  <div class="header">
    <h1>CCF SANDOVAL EVENTS</h1>
    <button class="manage-btn" onclick="window.location.href='admin/login.html'">MANAGE EVENT</button>
  </div>

  <!-- ✅ MAIN CALENDAR SECTION -->
  <div class="calendar-wrapper">
    <!-- Calendar Header with Controls -->
    <div class="calendar-header">
      <div class="month-navigation">
        <span id="monthYear">JUNE 2026</span>
        <button class="nav-arrow" onclick="previousMonth()">‹</button>
        <button class="nav-arrow" onclick="nextMonth()">›</button>
      </div>

      <div class="current-date-display">
        <div class="current-day" id="currentDay">TUESDAY</div>
        <div class="current-time" id="currentTime">11:30 AM</div>
      </div>

      <div class="view-controls">
        <button class="view-btn active" onclick="setView('month')">MONTH</button>
        <button class="view-btn" onclick="setView('day')">DAY</button>
        <button class="view-btn" onclick="setView('list')">LIST</button>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid" id="calendarGrid">
      <div class="day-header">
        <div class="day-header-cell">SUN</div>
        <div class="day-header-cell">MON</div>
        <div class="day-header-cell">TUE</div>
        <div class="day-header-cell">WED</div>
        <div class="day-header-cell">THU</div>
        <div class="day-header-cell">FRI</div>
        <div class="day-header-cell">SAT</div>
      </div>

      <div class="calendar-days" id="calendarDays">
        <!-- Calendar days will be populated by JavaScript -->
      </div>
    </div>

    <!-- Day View -->
    <div class="day-view hidden" id="dayView">
      <div class="day-view-content">
        <div class="day-view-date" id="dayViewDate"></div>
        <div class="day-view-events" id="dayViewEvents">
          <div class="day-view-no-events">No events scheduled for this day.</div>
        </div>
      </div>
    </div>

    <!-- List View -->
    <div class="list-view hidden" id="listView">
      <div class="list-view-title">All Upcoming Events</div>
      <div id="listViewEvents">
        <div class="list-view-no-events">No events scheduled.</div>
      </div>
    </div>
  </div>

  <!-- ✅ FOOTER -->
  <div class="footer">
    ©2026 CCF SANDOVAL EVENTS. ALL RIGHTS RESERVED.
  </div>

  <!-- ✅ Calendar Logic -->
  <script>
    let currentDate = new Date(2026, 5, 23); // June 23, 2026
    let currentView = 'month';

    // Mock events data - in real app, this would come from backend
    const mockEvents = {
      '2026-6-5': ['Church Service - 10:00 AM', 'Prayer Meeting - 7:00 PM'],
      '2026-6-12': ['Youth Group Activity - 6:00 PM'],
      '2026-6-15': ['Community Outreach - 9:00 AM'],
      '2026-6-23': ['Main Service - 11:00 AM', 'Bible Study - 6:00 PM'],
      '2026-6-28': ['Special Event - 5:00 PM']
    };

    function generateCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // Update month/year display
      const monthNames = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE',
                         'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
      document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;

      // Update current day and time
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[currentDate.getDay()];

      // Get first day of month and number of days
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendarDaysDiv = document.getElementById('calendarDays');
      calendarDaysDiv.innerHTML = '';

      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${daysInPrevMonth - i}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';

        // Highlight today
        const today = new Date();
        if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
          dayDiv.classList.add('today');
        }

        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        dayDiv.onclick = () => selectDay(year, month, day);
        calendarDaysDiv.appendChild(dayDiv);
      }

      // Next month days
      const totalCells = calendarDaysDiv.children.length;
      const remainingCells = 42 - totalCells; // 6 rows × 7 days
      for (let day = 1; day <= remainingCells; day++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day other-month';
        dayDiv.innerHTML = `<div class="day-number">${day}</div>`;
        calendarDaysDiv.appendChild(dayDiv);
      }
    }

    function previousMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      generateCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      generateCalendar();
    }

    function selectDay(year, month, day) {
      const selected = new Date(year, month, day);
      currentDate = selected;
      generateCalendar();
      
      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      document.getElementById('currentDay').textContent = dayNames[selected.getDay()];

      // If in day view, update it
      if (currentView === 'day') {
        updateDayView();
      }
    }

    function formatTime(hours, minutes) {
      const period = hours >= 12 ? 'PM' : 'AM';
      const displayHours = hours % 12 || 12;
      const displayMinutes = String(minutes).padStart(2, '0');
      return `${displayHours}:${displayMinutes} ${period}`;
    }

    function updateTime() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      document.getElementById('currentTime').textContent = formatTime(hours, minutes);
    }

    function updateDayView() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth() + 1;
      const day = currentDate.getDate();
      const dateKey = `${year}-${month}-${day}`;

      const dayNames = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];

      const dateDisplay = `${dayNames[currentDate.getDay()]}, ${monthNames[currentDate.getMonth()]} ${day}, ${year}`;
      document.getElementById('dayViewDate').textContent = dateDisplay;

      const events = mockEvents[dateKey] || [];
      const eventsDiv = document.getElementById('dayViewEvents');

      if (events.length === 0) {
        eventsDiv.innerHTML = '<div class="day-view-no-events">No events scheduled for this day.</div>';
      } else {
        eventsDiv.innerHTML = '<div class="day-view-events">' +
          events.map(event => `<div class="day-view-event">${event}</div>`).join('') +
          '</div>';
      }
    }

    function updateListView() {
      const allEvents = [];

      // Flatten all events from the mock data
      for (let dateKey in mockEvents) {
        const [year, month, day] = dateKey.split('-').map(Number);
        const events = mockEvents[dateKey];
        events.forEach(event => {
          allEvents.push({
            date: new Date(year, month - 1, day),
            event: event
          });
        });
      }

      // Sort by date
      allEvents.sort((a, b) => a.date - b.date);

      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                         'July', 'August', 'September', 'October', 'November', 'December'];

      const listDiv = document.getElementById('listViewEvents');
      if (allEvents.length === 0) {
        listDiv.innerHTML = '<div class="list-view-no-events">No events scheduled.</div>';
      } else {
        listDiv.innerHTML = allEvents.map(item => {
          const dateStr = `${monthNames[item.date.getMonth()]} ${item.date.getDate()}, ${item.date.getFullYear()}`;
          return `
            <div class="event-item">
              <div class="event-item-date">${dateStr}</div>
              <div class="event-item-title">${item.event}</div>
            </div>
          `;
        }).join('');
      }
    }

    function setView(view) {
      currentView = view;

      // Update button active states
      document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      // Hide all views
      document.getElementById('calendarGrid').classList.add('hidden');
      document.getElementById('dayView').classList.add('hidden');
      document.getElementById('listView').classList.add('hidden');

      // Show selected view
      if (view === 'month') {
        document.getElementById('calendarGrid').classList.remove('hidden');
      } else if (view === 'day') {
        document.getElementById('dayView').classList.remove('hidden');
        updateDayView();
      } else if (view === 'list') {
        document.getElementById('listView').classList.remove('hidden');
        updateListView();
      }
    }

    // Initialize calendar on page load
    window.addEventListener('DOMContentLoaded', () => {
      generateCalendar();
      updateTime();
      setInterval(updateTime, 60000); // Update time every minute
    });
  </script>

</body>
</html>
